<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - User Management</title>
    <!-- Bootstrap CSS -->\n    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">\n    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        
        .admin-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .admin-header h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        
        .admin-header p {
            color: var(--second-color);
            font-size: 1.1rem;
        }
        
        .users-table {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .search-box input {
            background: none;
            border: none;
            color: white;
            outline: none;
            margin-left: 10px;
            width: 200px;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .refresh-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: var(--second-color);
            transform: translateY(-2px);
        }
        
        .users-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .users-table th,
        .users-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .users-table th {
            background: rgba(0, 212, 255, 0.1);
            color: var(--primary-color);
            font-weight: bold;
        }
        
        .users-table td {
            color: white;
        }
        
        .role-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .role-admin {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        
        .role-user {
            background: rgba(68, 255, 68, 0.2);
            color: #44ff44;
            border: 1px solid #44ff44;
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        
        .status-active {
            background: rgba(68, 255, 68, 0.2);
            color: #44ff44;
            border: 1px solid #44ff44;
        }
        
        .status-inactive {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        
        .btn-edit {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-edit:hover {
            background: #00aaff;
        }
        
        .btn-deactivate {
            background: #ff9900;
            color: white;
        }
        
        .btn-deactivate:hover {
            background: #ff6600;
        }
        
        .btn-activate {
            background: #44ff44;
            color: #333;
        }
        
        .btn-activate:hover {
            background: #00cc00;
        }
        
        .loading {
            text-align: center;
            color: var(--primary-color);
            padding: 40px;
            font-size: 1.2rem;
        }
        
        .error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .success {
            background: rgba(68, 255, 68, 0.1);
            border: 1px solid #44ff44;
            color: #44ff44;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: var(--primary-color);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .admin-container {
                margin: 20px;
                padding: 10px;
            }
            
            .users-table {
                padding: 15px;
                overflow-x: auto;
            }
            
            .table-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <a href="../dashboard/dashboard.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>

    <div class="admin-container">
        <div class="admin-header">
            <h1>🔐 Admin Panel</h1>
            <p>User Management & Role Assignment</p>
        </div>

        <div id="message-container"></div>

        <div class="users-table">
            <div class="table-controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search users..." onkeyup="searchUsers()">
                </div>
                <button class="refresh-btn" onclick="loadUsers()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>

            <div id="loadingDiv" class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading users...
            </div>

            <div id="tableContainer" style="display: none;">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Users will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allUsers = [];
        let currentUser = null;

        // Check authentication and load current user
        function checkAuth() {
            const token = localStorage.getItem('authToken');
            const userStr = localStorage.getItem('currentUser');
            
            if (!token || !userStr) {
                window.location.href = '../register/login.html';
                return;
            }
            
            currentUser = JSON.parse(userStr);
            
            if (currentUser.role !== 'admin') {
                alert('Access denied. Admin privileges required.');
                window.location.href = '../dashboard/dashboard.html';
                return;
            }
        }

        // Load all users from backend
        async function loadUsers() {
            const token = localStorage.getItem('authToken');
            const loadingDiv = document.getElementById('loadingDiv');
            const tableContainer = document.getElementById('tableContainer');
            
            try {
                loadingDiv.style.display = 'block';
                tableContainer.style.display = 'none';
                
                const response = await fetch('http://localhost:3000/api/admin/users', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    allUsers = result.users;
                    displayUsers(allUsers);
                    loadingDiv.style.display = 'none';
                    tableContainer.style.display = 'block';
                } else {
                    showMessage(result.message || 'Failed to load users', 'error');
                    loadingDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Failed to load users';
                }
                
            } catch (error) {
                console.error('Load users error:', error);
                showMessage('Server connection error. Please try again.', 'error');
                loadingDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Connection error';
            }
        }

        // Display users in table
        function displayUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            
            users.forEach(user => {
                const row = document.createElement('tr');
                
                const joinDate = new Date(user.signupDate).toLocaleDateString();
                
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.fullname}</td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>
                        <span class="role-badge role-${user.role}">${user.role}</span>
                    </td>
                    <td>
                        <span class="status-badge status-${user.isActive ? 'active' : 'inactive'}">
                            ${user.isActive ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td>${joinDate}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn btn-edit" onclick="toggleUserRole(${user.id}, '${user.role}')">
                                <i class="fas fa-user-shield"></i> Change Role
                            </button>
                            ${user.isActive ? 
                                `<button class="action-btn btn-deactivate" onclick="toggleUserStatus(${user.id}, false)">
                                    <i class="fas fa-ban"></i> Deactivate
                                </button>` :
                                `<button class="action-btn btn-activate" onclick="toggleUserStatus(${user.id}, true)">
                                    <i class="fas fa-check"></i> Activate
                                </button>`
                            }
                        </div>
                    </td>
                `;
                
                tbody.appendChild(row);
            });
        }

        // Search users
        function searchUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filteredUsers = allUsers.filter(user => 
                user.fullname.toLowerCase().includes(searchTerm) ||
                user.username.toLowerCase().includes(searchTerm) ||
                user.email.toLowerCase().includes(searchTerm) ||
                user.role.toLowerCase().includes(searchTerm)
            );
            
            displayUsers(filteredUsers);
        }

        // Toggle user role
        async function toggleUserRole(userId, currentRole) {
            const newRole = currentRole === 'admin' ? 'user' : 'admin';
            
            if (!confirm(`Change user role from ${currentRole} to ${newRole}?`)) {
                return;
            }
            
            const token = localStorage.getItem('authToken');
            
            try {
                const response = await fetch(`http://localhost:3000/api/admin/users/${userId}/role`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ role: newRole })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(`User role updated to ${newRole}`, 'success');
                    loadUsers(); // Refresh the table
                } else {
                    showMessage(result.message || 'Failed to update role', 'error');
                }
                
            } catch (error) {
                console.error('Role update error:', error);
                showMessage('Server connection error. Please try again.', 'error');
            }
        }

        // Toggle user status
        async function toggleUserStatus(userId, isActive) {
            const action = isActive ? 'activate' : 'deactivate';
            
            if (!confirm(`Are you sure you want to ${action} this user?`)) {
                return;
            }
            
            const token = localStorage.getItem('authToken');
            
            try {
                const response = await fetch(`http://localhost:3000/api/admin/users/${userId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ isActive: isActive })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(`User ${action}d successfully`, 'success');
                    loadUsers(); // Refresh the table
                } else {
                    showMessage(result.message || `Failed to ${action} user`, 'error');
                }
                
            } catch (error) {
                console.error('Status update error:', error);
                showMessage('Server connection error. Please try again.', 'error');
            }
        }

        // Show message
        function showMessage(message, type) {
            const container = document.getElementById('message-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = type;
            messageDiv.textContent = message;
            
            container.innerHTML = '';
            container.appendChild(messageDiv);
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadUsers();
        });
    </script>
    <!-- Bootstrap JS -->\n    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>\n</body>
</html>
